# Dependabot configuration.
# Security alerts fire regardless of this file — this config adds scheduled
# PRs for non-security version updates so we don't drift on minor / patch
# bumps between CVE waves.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    # Cap open PRs so Dependabot can't flood the queue — if the backlog
    # grows past this, older PRs are auto-closed and re-opened after merge.
    open-pull-requests-limit: 5
    # Group minor + patch updates into a single weekly PR to cut noise.
    # Major bumps still get their own PR since they usually need a human
    # look at breaking changes.
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
    ignore:
      # js-yaml is a transitive dep of gray-matter@4, which hard-pins
      # js-yaml@^3.13.1. The js-yaml quadratic-alias DoS advisory is only
      # fixed in 4.2.0+, so the only resolution Dependabot can find downgrades
      # gray-matter 4.0.3 -> 2.0.1 (breaking) -- it refuses, and the
      # security-update job errors (security_update_not_possible) on EVERY run.
      # gray-matter only parses our own trusted MDX frontmatter at build time
      # (never attacker-controlled input), so the DoS is not reachable, and
      # forcing js-yaml@4 via overrides breaks gray-matter (v4 removed the
      # safeLoad API it calls). Ignore until gray-matter ships a js-yaml@4
      # major; revisit then.
      - dependency-name: "js-yaml"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - ci

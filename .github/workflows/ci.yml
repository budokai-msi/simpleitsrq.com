name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Marketing build — no secrets needed. The VITE_* values the
          # client bundle reads are only branding / affiliate tags, and
          # missing values fall back to empty strings in src/data/*.
          VITE_TURNSTILE_SITE_KEY: ""
          VITE_CALCOM_CAL_LINK: ""

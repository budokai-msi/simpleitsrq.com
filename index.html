    <!-- Per-request CSP nonce. Middleware substitutes __CSP_NONCE__ with a
         base64url random value on every HTML response, and the `style-src`
         directive in the response CSP header allows `'nonce-<that value>'`
         so Fluent UI's Griffel renderer can attach the same nonce to every
         runtime-injected <style> tag. See src/main.jsx for the Griffel wiring. -->
    <meta name="csp-nonce" content="__CSP_NONCE__" />

    <!-- Google AdSense — site verification (meta) + script loader.

         personalized ads or marketing cookies fire until the visitor
         opts in via the cookie banner. The src/components/AdSense.jsx
         AdUnit component still gates the rendered <ins> slots on
         marketing consent. -->
    <meta name="google-adsense-account" content="ca-pub-7420716928607113" />

    <script>
      // Theme bootstrap — runs before paint to prevent FOUC.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored || (prefersDark ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", theme === "dark" ? "#0B0D10" : "#0F6CBD");
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>

    <!-- Speculation Rules — Chrome 121+ / Edge 121+ prerender hints.
         When a visitor's pointer lands on (mousedown / touchstart) any
         eligible same-origin link, the browser prerenders that route
         in a hidden frame so the actual click feels instant (~0ms).
         Other browsers (Firefox, Safari) ignore this script entirely;
         it's a pure progressive enhancement.

         Eagerness "moderate" = trigger on pointerdown, ~190ms before
         the typical click. Burns at most ~2 concurrent prerenders per
         Chrome's budget so it doesn't tank the device.

         Excluded: /portal/* (auth + side-effects), /api/* (would bill
         a serverless function on hover), and explicit external/_blank
         links. Hash anchors and external schemes (mailto:, tel:) don't
         match `/*` so they're skipped automatically. -->
    <script type="speculationrules">
    {
      "prerender": [{
        "where": {
          "and": [
            { "href_matches": "/*" },
            { "not": { "href_matches": "/portal*" } },
            { "not": { "href_matches": "/api/*" } },
            { "not": { "selector_matches": "[rel~=external]" } },
            { "not": { "selector_matches": "[target=_blank]" } }
          ]
        },
        "eagerness": "moderate"
      }]
    }
    </script>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Simple IT SRQ">
  <!--
    Modern, restrained mark that scales cleanly from 16×16 (browser tab)
    up to 1024×1024 (App Store / iOS home screen). Iteration goals over
    the previous version:
      • Drop the corner brackets + grid pattern — both turned to mush
        below 48px and made the home-screen install look noisy / cheap.
      • Bigger, more confident geometric "S" — fills more of the tile
        so the silhouette reads at thumbnail size.
      • Brighter, deeper blue gradient w/ a soft top-down highlight for
        a Material/Google-esque "fluid" feel without skeuomorphism.
      • Status dot kept (brand cue: live / monitored) but moved tighter
        to the corner and given a cleaner inner specular.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#3A9CF0"/>
      <stop offset="55%"  stop-color="#0F6CBD"/>
      <stop offset="100%" stop-color="#0A3D6E"/>
    </linearGradient>
    <linearGradient id="shine" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="innerglow" cx="0.5" cy="0.5" r="0.7">
      <stop offset="60%"  stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="92%"  stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DCE6F2"/>
    </linearGradient>
    <radialGradient id="dot" cx="35%" cy="30%" r="75%">
      <stop offset="0%"   stop-color="#FFF1C2"/>
      <stop offset="55%"  stop-color="#FFD66B"/>
      <stop offset="100%" stop-color="#D69314"/>
    </radialGradient>
    <filter id="sshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.45"/>
      <feOffset dy="0.4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.40"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <rect width="32" height="32" rx="8" fill="url(#innerglow)"/>
  <rect width="32" height="32" rx="8" fill="url(#shine)"/>

  <path
    filter="url(#sshadow)"
    fill="url(#sgrad)"
    d="M 5 8 L 23 8 L 23 12 L 9 12 L 9 14 L 23 14 L 23 24 L 5 24 L 5 20 L 19 20 L 19 18 L 5 18 Z"
  />
  <g stroke="#FFFFFF" stroke-opacity="0.40" stroke-width="0.6" fill="none">
    <path d="M 5.4 8.5 L 22.6 8.5"/>
    <path d="M 9.4 14.5 L 22.6 14.5"/>
    <path d="M 5.4 20.5 L 18.6 20.5"/>
  </g>

  <circle cx="25.5" cy="6.5" r="3.4" fill="#FFD66B" fill-opacity="0.18"/>
  <circle cx="25.5" cy="6.5" r="2.4" fill="url(#dot)"/>
  <circle cx="24.85" cy="5.85" r="0.7" fill="#FFFFFF" fill-opacity="0.85"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Simple IT SRQ">
  <defs>
    <!-- Tile background — diagonal brand → deeper brand for depth at every size. -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2B88D8"/>
      <stop offset="55%"  stop-color="#0A4E8F"/>
      <stop offset="100%" stop-color="#062A4D"/>
    </linearGradient>
    <!-- Specular highlight along the top — dimensional without heavy shadow. -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- "S" gradient — pearl white → faint cool so the letterform reads sculpted. -->
    <linearGradient id="sgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E6EDF6"/>
    </linearGradient>
    <!-- Status dot — amber accent w/ inner glow. Matches in-app Logo. -->
    <radialGradient id="dot" cx="35%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#FFE9A8"/>
      <stop offset="55%"  stop-color="#FFD66B"/>
      <stop offset="100%" stop-color="#E0A92E"/>
    </radialGradient>
    <!-- Faint grid behind the S — "terminal / systems" cue, not noisy. -->
    <pattern id="grid" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse">
      <path d="M 5 0 L 0 0 0 5" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Base tile + 1px inner stroke for crispness on light bg. -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <rect width="32" height="32" rx="7" fill="url(#grid)"/>
  <rect width="32" height="32" rx="7" fill="url(#shine)"/>

  <!-- Corner brackets — IT/terminal cue, very subtle. -->
  <g stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="0.9" stroke-linecap="round" fill="none">
    <path d="M 3.5 5 L 3.5 3.5 L 5 3.5"/>
    <path d="M 28.5 3.5 L 27 3.5"/>
    <path d="M 3.5 27 L 3.5 28.5 L 5 28.5"/>
    <path d="M 28.5 27 L 28.5 28.5 L 27 28.5"/>
  </g>

  <!-- Geometric "S" — three rigid bars + alternating connectors.
       Built from straight 90° segments only so it stays crisp at every
       render size, including 16×16. The path is one continuous outline:
         top bar (y=8..12)  + left connector  + middle bar (y=14..18)
         + right connector  + bottom bar (y=20..24).
       All bars 4px tall, both gaps 2px — a 2:1 ratio that reads
       confidently rigid without becoming slotted. -->
  <path
    fill="url(#sgrad)"
    d="M 6 8 L 22 8 L 22 12 L 10 12 L 10 14 L 22 14 L 22 24 L 6 24 L 6 20 L 18 20 L 18 18 L 6 18 Z"
  />
  <!-- Inner top-edge highlight on each bar — 1px white-translucent line
       gives a hint of extrusion without a full bevel. -->
  <g stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="0.6" fill="none">
    <path d="M 6.4 8.5 L 21.6 8.5" />
    <path d="M 10.4 14.5 L 21.6 14.5" />
    <path d="M 6.4 20.5 L 17.6 20.5" />
  </g>

  <!-- Active-defense status dot — amber, glowing ring. Reads as "live / monitored". -->
  <circle cx="25" cy="7" r="3.6" fill="#FFD66B" fill-opacity="0.20"/>
  <circle cx="25" cy="7" r="2.8" fill="url(#dot)" stroke="#0A4E8F" stroke-width="0.6"/>
  <circle cx="24.2" cy="6.2" r="0.8" fill="#FFFFFF" fill-opacity="0.85"/>
</svg>

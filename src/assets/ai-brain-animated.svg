      <stop offset="0%" stop-color="#fffbe6" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.2" />
    </radialGradient>
    <linearGradient id="ai-brain-main" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6" />
      <stop offset="1" stop-color="#38BDF8" />
    </linearGradient>
    <filter id="ai-brain-shadow" x="-10" y="-10" width="116" height="116" filterUnits="userSpaceOnUse">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <defs>
    <radialGradient id="cloud-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.18" />
    </radialGradient>
    <linearGradient id="cloud-main" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" />
      <stop offset="1" stop-color="#075985" />
    </linearGradient>
    <filter id="cloud-shadow" x="-10" y="-10" width="116" height="116" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#38BDF8" flood-opacity="0.18" />
    </filter>
  </defs>
  <circle cx="48" cy="48" r="44" fill="url(#cloud-glow)">
    <animate attributeName="r" values="44;48;44" dur="2.4s" repeatCount="indefinite" />
  </circle>
  <g filter="url(#cloud-shadow)">
    <ellipse cx="56" cy="56" rx="18" ry="10" fill="url(#cloud-main)"/>
    <ellipse cx="40" cy="60" rx="12" ry="8" fill="#fff" fill-opacity="0.18">
      <animate attributeName="rx" values="12;16;12" dur="2.2s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="64" cy="60" rx="8" ry="6" fill="#fff" fill-opacity="0.12">
      <animate attributeName="rx" values="8;12;8" dur="2s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="48" cy="52" rx="10" ry="6" fill="#fff" fill-opacity="0.10">
      <animate attributeName="rx" values="10;14;10" dur="2.6s" repeatCount="indefinite" />
    </ellipse>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" fill="none">
  <!-- Sarasota skyline, bold lines, technical/blueprint style, no blobs -->
  <rect width="900" height="400" fill="#f8fafc"/>
  <g stroke="#1a365d" stroke-width="3">
    <!-- Ground line -->
    <line x1="60" y1="350" x2="840" y2="350"/>
    <!-- Buildings (skyline) -->
    <rect x="100" y="250" width="60" height="100" fill="#e2e8f0"/>
    <rect x="180" y="200" width="40" height="150" fill="#cbd5e1"/>
    <rect x="240" y="280" width="50" height="70" fill="#e2e8f0"/>
    <rect x="310" y="230" width="70" height="120" fill="#cbd5e1"/>
    <rect x="400" y="180" width="90" height="170" fill="#e2e8f0"/>
    <rect x="510" y="260" width="60" height="90" fill="#cbd5e1"/>
    <rect x="590" y="220" width="50" height="130" fill="#e2e8f0"/>
    <rect x="660" y="270" width="40" height="80" fill="#cbd5e1"/>
    <rect x="720" y="240" width="60" height="110" fill="#e2e8f0"/>
    <!-- Palm tree (left) -->
    <line x1="140" y1="250" x2="140" y2="210"/>
    <path d="M140 210 Q130 200 120 210"/>
    <path d="M140 210 Q150 200 160 210"/>
    <path d="M140 210 Q135 195 145 200"/>
    <!-- Bridge (center) -->
    <path d="M300 350 Q450 320 600 350" stroke="#1a365d" stroke-width="4" fill="none"/>
    <line x1="375" y1="340" x2="375" y2="350"/>
    <line x1="525" y1="340" x2="525" y2="350"/>
    <!-- IT/tech: server rack (right) -->
    <rect x="800" y="270" width="30" height="80" fill="#cbd5e1"/>
    <rect x="805" y="280" width="20" height="10" fill="#64748b"/>
    <rect x="805" y="295" width="20" height="10" fill="#64748b"/>
    <rect x="805" y="310" width="20" height="10" fill="#64748b"/>
    <!-- Sun (top right, technical style) -->
    <circle cx="820" cy="80" r="30" stroke="#fbbf24" stroke-width="4" fill="none"/>
    <g stroke="#fbbf24" stroke-width="2">
      <line x1="820" y1="40" x2="820" y2="20"/>
      <line x1="820" y1="120" x2="820" y2="140"/>
      <line x1="790" y1="80" x2="760" y2="80"/>
      <line x1="850" y1="80" x2="880" y2="80"/>
      <line x1="800" y1="60" x2="780" y2="40"/>
      <line x1="840" y1="60" x2="860" y2="40"/>
      <line x1="800" y1="100" x2="780" y2="120"/>
      <line x1="840" y1="100" x2="860" y2="120"/>
    </g>
  </g>
  <!-- Label: "SimpleITSRQ" in blueprint font style -->
  <text x="70" y="390" font-family="monospace,Consolas,Menlo" font-size="40" fill="#1a365d" letter-spacing="2">SimpleITSRQ</text>
</svg>

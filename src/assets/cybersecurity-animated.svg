<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <defs>
    <radialGradient id="cyber-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0.18" />
    </radialGradient>
    <linearGradient id="cyber-main" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DC2626" />
      <stop offset="1" stop-color="#7F1D1D" />
    </linearGradient>
    <filter id="cyber-shadow" x="-10" y="-10" width="116" height="116" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#DC2626" flood-opacity="0.18" />
    </filter>
  </defs>
  <circle cx="48" cy="48" r="44" fill="url(#cyber-glow)">
    <animate attributeName="r" values="44;48;44" dur="2.2s" repeatCount="indefinite" />
  </circle>
  <g filter="url(#cyber-shadow)">
    <rect x="28" y="38" width="40" height="28" rx="8" fill="url(#cyber-main)"/>
    <rect x="38" y="48" width="20" height="8" rx="4" fill="#fff" fill-opacity="0.18">
      <animate attributeName="width" values="20;28;20" dur="2s" repeatCount="indefinite" />
      <animate attributeName="x" values="38;34;38" dur="2s" repeatCount="indefinite" />
    </rect>
    <path d="M48 38v-8a8 8 0 0 1 16 0v8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <animate attributeName="stroke-width" values="2.5;4;2.5" dur="1.8s" repeatCount="indefinite" />
    </path>
  </g>
</svg>

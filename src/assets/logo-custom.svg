<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" fill="none">
  <!-- Custom logo: Sarasota bridge + server, blueprint style -->
  <rect width="120" height="40" fill="#f8fafc"/>
  <g stroke="#1a365d" stroke-width="2">
    <!-- Bridge arch -->
    <path d="M10 30 Q60 10 110 30" fill="none"/>
    <!-- Bridge supports -->
    <line x1="30" y1="30" x2="30" y2="38"/>
    <line x1="60" y1="20" x2="60" y2="38"/>
    <line x1="90" y1="30" x2="90" y2="38"/>
    <!-- Server rack (right) -->
    <rect x="100" y="18" width="10" height="14" fill="#cbd5e1"/>
    <rect x="103" y="21" width="4" height="2" fill="#64748b"/>
    <rect x="103" y="25" width="4" height="2" fill="#64748b"/>
    <!-- Palm tree (left) -->
    <line x1="20" y1="30" x2="20" y2="20"/>
    <path d="M20 20 Q15 15 10 20"/>
    <path d="M20 20 Q25 15 30 20"/>
  </g>
  <text x="40" y="38" font-family="monospace,Consolas,Menlo" font-size="14" fill="#1a365d" letter-spacing="1">SimpleITSRQ</text>
</svg>
